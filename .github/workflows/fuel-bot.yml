name: Проверка АЗС и публикация в MAX

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Что проверить
        required: true
        type: choice
        default: test-max
        options:
          - test-max
          - fuel-check
  schedule:
    # Запуск примерно раз в 10 минут. Расписание GitHub работает по UTC.
    - cron: '3/10 * * * *'

permissions:
  contents: read

concurrency:
  group: dolgorukovo-fuel-bot
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 7

    steps:
      - name: Скачать код
        uses: actions/checkout@v5

      - name: Установить Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Добавить сертификаты Минцифры для MAX API
        shell: bash
        run: |
          set -euo pipefail

          CA_DIR="$RUNNER_TEMP/russian-trusted-ca"
          mkdir -p "$CA_DIR"

          # Эти два файла опубликованы на странице сертификатов Госуслуг.
          # --insecure применяется ТОЛЬКО при первичном скачивании CA,
          # после чего корневой сертификат проверяется по закреплённому SHA-256.
          curl --fail --silent --show-error --location --insecure \
            "https://gu-st.ru/content/Other/doc/russian_trusted_root_ca.cer" \
            --output "$CA_DIR/root.pem"

          curl --fail --silent --show-error --location --insecure \
            "https://gu-st.ru/content/Other/doc/russian_trusted_sub_ca.cer" \
            --output "$CA_DIR/sub.pem"

          EXPECTED_ROOT_SHA256="D26D2D0231B7C39F92CC738512BA54103519E4405D68B5BD703E9788CA8ECF31"
          ACTUAL_ROOT_SHA256="$(openssl x509 -in "$CA_DIR/root.pem" -noout -fingerprint -sha256 | cut -d= -f2 | tr -d ':')"

          if [ "$ACTUAL_ROOT_SHA256" != "$EXPECTED_ROOT_SHA256" ]; then
            echo "Ошибка: отпечаток корневого сертификата Минцифры не совпал."
            echo "Ожидался: $EXPECTED_ROOT_SHA256"
            echo "Получен:   $ACTUAL_ROOT_SHA256"
            exit 1
          fi

          # Проверяем, что выпускающий сертификат действительно подписан корневым.
          openssl verify -CAfile "$CA_DIR/root.pem" "$CA_DIR/sub.pem"

          cat "$CA_DIR/root.pem" "$CA_DIR/sub.pem" > "$CA_DIR/bundle.pem"

          # Node.js читает NODE_EXTRA_CA_CERTS только при запуске процесса.
          echo "NODE_EXTRA_CA_CERTS=$CA_DIR/bundle.pem" >> "$GITHUB_ENV"
          echo "NODE_USE_SYSTEM_CA=1" >> "$GITHUB_ENV"

          echo "Сертификаты Минцифры проверены и подключены."

      - name: Проверить обязательные секреты
        env:
          MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
          MAX_CHANNEL_LINK: ${{ secrets.MAX_CHANNEL_LINK }}
          MAX_TARGET_CHAT_ID: ${{ secrets.MAX_TARGET_CHAT_ID }}
        run: |
          test -n "$MAX_BOT_TOKEN" || (echo "Не создан секрет MAX_BOT_TOKEN" && exit 1)
          if [ -z "$MAX_CHANNEL_LINK" ] && [ -z "$MAX_TARGET_CHAT_ID" ]; then
            echo "Создайте MAX_CHANNEL_LINK или MAX_TARGET_CHAT_ID"
            exit 1
          fi

      - name: Отправить тестовое сообщение в MAX
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'test-max'
        env:
          MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
          MAX_CHANNEL_LINK: ${{ secrets.MAX_CHANNEL_LINK }}
          MAX_TARGET_CHAT_ID: ${{ secrets.MAX_TARGET_CHAT_ID }}
        run: npm run test:max

      - name: Проверить Chrome
        if: github.event_name == 'schedule' || inputs.mode == 'fuel-check'
        run: google-chrome --version

      - name: Получить данные АЗС и отправить в MAX
        if: github.event_name == 'schedule' || inputs.mode == 'fuel-check'
        env:
          MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
          MAX_CHANNEL_LINK: ${{ secrets.MAX_CHANNEL_LINK }}
          MAX_TARGET_CHAT_ID: ${{ secrets.MAX_TARGET_CHAT_ID }}
          CHROME_PATH: /usr/bin/google-chrome
          SBER_SOURCE_URL: https://sberazs.ru/
          CAPTURE_SECONDS: '25'
        run: npm run run

      - name: Сохранить диагностику при ошибке получения АЗС
        if: failure() && (github.event_name == 'schedule' || inputs.mode == 'fuel-check')
        uses: actions/upload-artifact@v4
        with:
          name: fuel-bot-diagnostics
          path: logs/
          if-no-files-found: ignore
          retention-days: 7
